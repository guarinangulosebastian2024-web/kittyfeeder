<!DOCTYPE html>
<html>

<head>
<title>KittyFeeder</title>

<style>

body{
background:#111827;
background-image:url("logo.png");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
background-attachment:fixed;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.header{
width:420px;
margin:auto;
margin-top:30px;
padding:20px;
background:rgba(0,0,0,0.65);
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.header h1{
font-size:48px;
margin:0;
}

.header p{
font-size:20px;
margin-top:8px;
}

.reloj{
width:360px;
margin:auto;
margin-top:15px;
margin-bottom:20px;
padding:15px;
background:rgba(0,0,0,0.65);
border-radius:12px;
font-size:24px;
font-weight:bold;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

button{
font-size:26px;
padding:18px 35px;
background:#22c55e;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

select{
font-size:22px;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

.section{
width:80%;
margin:auto;
margin-top:40px;
padding:40px;
background:rgba(31,41,55,0.88);
border-radius:18px;
font-size:22px;
text-align:left;
}

.section h2{
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h1>KittyFeeder</h1>
<p>Control inteligente de alimentación para tu mascota</p>
</div>

<div class="section">
<h2>Dar comida ahora</h2>

<div style="text-align:center;">
<button onclick="darComida()">DAR COMIDA</button>
</div>
</div>

<div class="section">

<h2>Programar próxima comida automática</h2>

<p style="text-align:center;">
Selecciona la hora en la que deseas que el comedero dispense la próxima ración de alimento.
</p>

<div style="text-align:center;">

<select id="hora">

<option value="1">1 AM</option>
<option value="2">2 AM</option>
<option value="3">3 AM</option>
<option value="4">4 AM</option>
<option value="5">5 AM</option>
<option value="6">6 AM</option>
<option value="7">7 AM</option>
<option value="8">8 AM</option>
<option value="9">9 AM</option>
<option value="10">10 AM</option>
<option value="11">11 AM</option>

<option value="12">12 PM</option>
<option value="13">1 PM</option>
<option value="14">2 PM</option>
<option value="15">3 PM</option>
<option value="16">4 PM</option>
<option value="17">5 PM</option>
<option value="18">6 PM</option>
<option value="19">7 PM</option>
<option value="20">8 PM</option>
<option value="21">9 PM</option>
<option value="22">10 PM</option>
<option value="23">11 PM</option>

</select>

<select id="min"></select>

</div>

<br>

<div style="text-align:center;">
<button onclick="guardar()">Guardar programación</button>
</div>

</div>

<script>

const token="3BbMQhwErMYUsrMrJh261-ihcrm_zkGu";

function generarMinutos(){

let min=document.getElementById("min");

for(let i=0;i<60;i++){

let texto=i.toString().padStart(2,'0');
min.add(new Option(texto,i));

}

}

generarMinutos();

function darComida(){

fetch("https://blynk.cloud/external/api/update?token="+token+"&V0=1");

alert("Comida enviada");

}

async function guardar(){

let h=document.getElementById("hora").value;
let m=document.getElementById("min").value;

await fetch("https://blynk.cloud/external/api/update?token="+token+"&V1="+h);
await fetch("https://blynk.cloud/external/api/update?token="+token+"&V5="+m);

alert("Programación guardada");

}

</script>

</body>
</html>
