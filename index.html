3<!DOCTYPE html>
<html>
<head>
<title>KittyFeeder</title>
<style>
body{
background:#111827;
background-image:url("logo.png");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
background-attachment:fixed;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.header{
width:420px;
margin:auto;
margin-top:30px;
padding:20px;
background:rgba(0,0,0,0.65);
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.header img{
width:120px;
margin-bottom:10px;
}

.header h1{
font-size:48px;
margin:0;
}

.header p{
font-size:20px;
margin-top:8px;
}

.reloj{
font-size:24px;
margin-top:10px;
color:#4ade80;
font-weight:bold;
}

button{
font-size:26px;
padding:18px 35px;
background:#22c55e;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

select{
font-size:22px;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

.section{
width:80%;
margin:auto;
margin-top:40px;
padding:40px;
background:rgba(31,41,55,0.88);
border-radius:18px;
font-size:22px;
text-align:center;
}

.resultado{
font-size:22px;
margin-top:15px;
color:#4ade80;
font-weight:bold;
}

#infoProgramacion {
font-size:24px;
margin-top:20px;
color:#4ade80;
padding:10px;
border: 2px dashed #4ade80;
border-radius: 10px;
display: inline-block;
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png">
    <h1>KittyFeeder</h1>
    <p>Control inteligente de alimentación para tu mascota</p>
    <div class="reloj" id="reloj"></div>
</div>

<div class="section">
    <h2>Dar comida ahora</h2>
    <button 
        onmousedown="darComida()" 
        onmouseup="pararComida()" 
        ontouchstart="darComida()" 
        ontouchend="pararComida()">
        Oprime aquí para darle comida
    </button>
</div>

<div class="section">
    <h2>Programar comida</h2>
    <p>Horario AM</p>
    <select id="horaAM" onchange="document.getElementById('horaPM').value='none'">
        <option value="none">-- Seleccionar AM --</option>
        <option value="0">12 AM</option>
        <option value="1">1 AM</option>
        <option value="2">2 AM</option>
        <option value="3">3 AM</option>
        <option value="4">4 AM</option>
        <option value="5">5 AM</option>
        <option value="6">6 AM</option>
        <option value="7">7 AM</option>
        <option value="8">8 AM</option>
        <option value="9">9 AM</option>
        <option value="10">10 AM</option>
        <option value="11">11 AM</option>
    </select>

    <p>Horario PM</p>
    <select id="horaPM" onchange="document.getElementById('horaAM').value='none'">
        <option value="none">-- Seleccionar PM --</option>
        <option value="12">12 PM</option>
        <option value="13">1 PM</option>
        <option value="14">2 PM</option>
        <option value="15">3 PM</option>
        <option value="16">4 PM</option>
        <option value="17">5 PM</option>
        <option value="18">6 PM</option>
        <option value="19">7 PM</option>
        <option value="20">8 PM</option>
        <option value="21">9 PM</option>
        <option value="22">10 PM</option>
        <option value="23">11 PM</option>
    </select>

    <p>Minutos</p>
    <select id="min"></select>

    <br><br>
    <button onclick="guardarHorario()">Guardar horario</button>
    
    <br>
    <div id="infoProgramacion">Próxima comida: No programada</div>
</div>

<div class="section">
    <h2>Configurar mascota</h2>
    <p>Peso mascota (kg)</p>
    <select id="peso" onchange="calcular()">
        <option value="1">1 kg</option>
        <option value="2">2 kg</option>
        <option value="3">3 kg</option>
        <option value="4">4 kg</option>
        <option value="5" selected>5 kg</option>
        <option value="6">6 kg</option>
        <option value="7">7 kg</option>
        <option value="8">8 kg</option>
    </select>
    <p>Comidas por día</p>
    <select id="comidas" onchange="calcular()">
        <option value="1">1 comida</option>
        <option value="2">2 comidas</option>
        <option value="3" selected>3 comidas</option>
        <option value="4">4 comidas</option>
        <option value="5">5 comidas</option>
    </select>
    <div class="resultado" id="resultado">Porción recomendada: 0 g</div>
    <br>
    <button onclick="guardarMascota()">Guardar configuración</button>
</div>

<script>
const token="3BbMQhwErMYUsrMrJh261-ihcrm_zkGu";

function generarMinutos(){
    let min=document.getElementById("min");
    for(let i=0;i<60;i++){
        let texto=i.toString().padStart(2,'0')+" min";
        min.add(new Option(texto,i));
    }
}
generarMinutos();

function calcular(){
    let peso=parseFloat(document.getElementById("peso").value)
    let comidas=parseFloat(document.getElementById("comidas").value)
    let gramosDia=peso*50
    let gramosPorComida=Math.round(gramosDia/comidas)
    document.getElementById("resultado").innerHTML="Porción recomendada: "+gramosPorComida+" g por comida"
}
calcular();

function darComida(){
    fetch("https://blynk.cloud/external/api/update?token="+token+"&V0=1")
}

function pararComida(){
    fetch("https://blynk.cloud/external/api/update?token="+token+"&V0=0")
}

async function guardarHorario(){
    let hAM = document.getElementById("horaAM").value;
    let hPM = document.getElementById("horaPM").value;
    let m = document.getElementById("min").value;
    let horaFinal;
    let textoPantalla;

    if(hPM !== "none") {
        horaFinal = hPM;
        let h12 = (horaFinal == 12) ? 12 : horaFinal - 12;
        textoPantalla = h12 + ":" + m.padStart(2,'0') + " PM";
    } else if (hAM !== "none") {
        horaFinal = hAM;
        let h12 = (horaFinal == 0) ? 12 : horaFinal;
        textoPantalla = h12 + ":" + m.padStart(2,'0') + " AM";
    } else {
        alert("Por favor selecciona una hora (AM o PM)");
        return;
    }

    await fetch("https://blynk.cloud/external/api/update?token="+token+"&V1="+horaFinal);
    await fetch("https://blynk.cloud/external/api/update?token="+token+"&V5="+m);

    document.getElementById("infoProgramacion").innerHTML = "Próxima comida: " + textoPantalla;
    alert("Horario guardado: " + textoPantalla);
}

async function guardarMascota(){
    let peso=document.getElementById("peso").value
    let comidas=document.getElementById("comidas").value
    await fetch("https://blynk.cloud/external/api/update?token="+token+"&V10="+peso)
    await fetch("https://blynk.cloud/external/api/update?token="+token+"&V11="+comidas)
    alert("Configuración guardada")
}

function actualizarReloj(){
    let ahora=new Date()
    let hora=ahora.toLocaleTimeString()
    let fecha=ahora.toLocaleDateString()
    document.getElementById("reloj").innerHTML=hora+" | "+fecha
}

setInterval(actualizarReloj,1000)
actualizarReloj()
</script>
</body>
</html>
