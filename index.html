<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KittyFeeder Elite</title>
    <style>
        :root {
            --primary: #22c55e;
            --secondary: #3b82f6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Contenedor de fotos de mascotas */
        .pet-header {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0 10px 0;
        }

        .pet-profile {
            text-align: center;
        }

        .pet-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
            background: #1e293b;
        }

        .pet-photo.fiona {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .pet-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pet-name {
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .header {
            width: 90%; max-width: 450px;
            margin: 10px auto 20px auto;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section {
            width: 90%; max-width: 450px;
            margin: 15px auto;
            padding: 25px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        button {
            font-size: 18px; width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--primary), #16a34a);
            border: none; border-radius: 16px;
            color: white; font-weight: bold;
            margin-top: 15px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }

        select {
            font-size: 17px; padding: 12px; width: 100%;
            border-radius: 12px; background: #0f172a; color: white; border: 1px solid #334155;
            margin: 10px 0;
        }

        .time-grid { display: flex; gap: 10px; margin-top: 10px; }
        .time-item { flex: 1; }
        .time-item p { font-size: 12px; color: #94a3b8; margin: 0 0 5px 0; }

        #reloj { font-size: 20px; color: #4ade80; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="pet-header">
        <div class="pet-profile">
            <div class="pet-photo">
                <img src="kitty.png" alt="Kitty">
            </div>
            <div class="pet-name" style="color: #4ade80;">KITTY</div>
        </div>
        <div class="pet-profile">
            <div class="pet-photo fiona">
                <img src="fiona.png" alt="Fiona">
            </div>
            <div class="pet-name" style="color: #60a5fa;">FIONA</div>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0; font-size: 28px;">KittyFeeder Pro</h1>
        <div id="reloj">--:--:--</div>
    </div>

    <div class="section">
        <h2 style="margin-top:0;">Alimentación</h2>
        <select id="modoAlimentacion" onchange="cambiarModo()">
            <option value="manual">Modo Manual</option>
            <option value="inteligente">Modo Inteligente</option>
        </select>
        <div id="contenedorManual">
            <button onmousedown="accionManual(1)" onmouseup="accionManual(0)" ontouchstart="accionManual(1)" ontouchend="accionManual(0)" class="btn-blue">
                Mantener para servir
            </button>
        </div>
        <div id="contenedorInteligente" style="display:none;">
            <button onclick="accionInteligente()" style="background: #8b5cf6; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);">
                Ración Inteligente
            </button>
        </div>
    </div>

    <div class="section">
        <h2 style="margin-top:0;">Programación</h2>
        <div class="time-grid">
            <div class="time-item"><p>AM</p><select id="horaAM" onchange="limpiarPM()"><option value="none">--</option><option value="0">12</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option></select></div>
            <div class="time-item"><p>PM</p><select id="horaPM" onchange="limpiarAM()"><option value="none">--</option><option value="12">12</option><option value="13">1</option><option value="14">2</option><option value="15">3</option><option value="16">4</option><option value="17">5</option><option value="18">6</option><option value="19">7</option><option value="20">8</option><option value="21">9</option><option value="22">10</option><option value="23">11</option></select></div>
            <div class="time-item"><p>MIN</p><select id="min"></select></div>
        </div>
        <button onclick="guardarHorario()">Guardar Horario</button>
    </div>

<script>
    const token="3BbMQhwErMYUsrMrJh261-ihcrm_zkGu";

    function cambiarModo() {
        const modo = document.getElementById("modoAlimentacion").value;
        document.getElementById("contenedorManual").style.display = (modo === "manual") ? "block" : "none";
        document.getElementById("contenedorInteligente").style.display = (modo === "inteligente") ? "block" : "none";
    }

    function accionManual(valor) {
        fetch("https://blynk.cloud/external/api/update?token="+token+"&V0="+valor);
    }

    function accionInteligente() {
        fetch("https://blynk.cloud/external/api/update?token="+token+"&V2=1");
        alert("🚀 Comando enviado: Ración para Kitty y Fiona");
    }

    function generarMinutos(){
        let min=document.getElementById("min");
        for(let i=0; i<60; i++){
            min.add(new Option(i.toString().padStart(2,'0'), i));
        }
    }
    generarMinutos();

    function limpiarPM(){ document.getElementById('horaPM').value='none'; }
    function limpiarAM(){ document.getElementById('horaAM').value='none'; }

    async function guardarHorario(){
        let hAM = document.getElementById("horaAM").value;
        let hPM = document.getElementById("horaPM").value;
        let m = document.getElementById("min").value;
        let horaFinal = (hPM !== "none") ? hPM : hAM;
        if(horaFinal === "none") { alert("Elige una hora"); return; }
        
        await fetch("https://blynk.cloud/external/api/update?token="+token+"&V1="+horaFinal);
        await fetch("https://blynk.cloud/external/api/update?token="+token+"&V5="+m);
        alert("✅ Horario actualizado");
    }

    setInterval(() => {
        let ahora = new Date();
        document.getElementById("reloj").innerHTML = ahora.toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
